<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Return — Analizador de inversión inmobiliaria</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#ba7517">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Return">
  <link rel="apple-touch-icon" href="icon-192.png">
  <meta name="mobile-web-app-capable" content="yes">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#f9f9f7;color:#1a1a1a;min-height:100vh;padding:24px}
.app{max-width:1200px;margin:0 auto}
.hdr{display:flex;align-items:baseline;gap:10px;padding-bottom:12px;border-bottom:1px solid #e5e5e0}
.hdr-t{font-size:22px;font-weight:500}.hdr-s{font-size:12px;color:#999}
.tabs{display:flex;border-bottom:1px solid #e5e5e0;margin-bottom:16px;flex-wrap:wrap}
.tab{padding:10px 16px;border:none;background:transparent;cursor:pointer;font-family:inherit;font-size:13px;font-weight:500;color:#999;border-bottom:2px solid transparent;margin-bottom:-1px}
.tab.active{color:#ba7517;border-bottom-color:#ba7517}
.panel{display:none}.panel.active{display:block}
.g2{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:14px;align-items:start}
@media(max-width:700px){.g2{grid-template-columns:1fr}}
.sec{border:1px solid #e5e5e0;border-radius:10px;margin-bottom:8px;overflow:hidden}
.sec-h{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;background:#f4f4f0;cursor:pointer;user-select:none}
.sec-h:hover{background:#eeeee8}
.sec-ht{font-size:12px;font-weight:500;color:#555}
.arr{font-size:11px;color:#aaa;display:inline-block;transition:transform .15s}
.arr.open{transform:rotate(180deg)}
.sec-b{padding:12px;border-top:1px solid #e5e5e0;display:none}
.sec-b.open{display:block}
.irow{margin-bottom:9px}.irow:last-child{margin-bottom:0}
.ilbl{font-size:11px;color:#666;margin-bottom:3px}
.iwrap{display:flex;align-items:center;border:1px solid #e5e5e0;border-radius:6px;overflow:hidden}
.iwrap:focus-within{border-color:#ba7517;box-shadow:0 0 0 2px rgba(186,117,23,.1)}
.iwrap input,.iwrap select{flex:1;border:none;background:#fff;padding:7px 10px;font-size:13px;font-family:inherit;color:#1a1a1a;outline:none;min-width:0;cursor:pointer}
.iwrap select:disabled{color:#bbb;cursor:not-allowed;background:#fafaf8}
.iunit{padding:6px 9px;font-size:11px;color:#aaa;font-family:'Courier New',monospace;background:#f4f4f0;border-left:1px solid #e5e5e0;white-space:nowrap}
.irow-num .iwrap input{font-family:'Courier New',monospace;cursor:text}
.trow{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px}
.tlbl{font-size:12px;color:#555}.tsub{font-size:11px;color:#aaa;margin-top:1px}
.tog{width:38px;height:21px;border-radius:11px;background:#ccc;cursor:pointer;position:relative;flex-shrink:0;transition:background .2s}
.tog.on{background:#ba7517}
.togk{position:absolute;top:3px;left:3px;width:15px;height:15px;border-radius:50%;background:#fff;transition:left .18s}
.tog.on .togk{left:20px}
.sum-card{background:#f4f4f0;border:1px solid #e5e5e0;border-radius:10px;padding:14px;margin-bottom:8px}
.sum-title{font-size:12px;font-weight:500;color:#555;margin-bottom:10px}
.note-card{border:1px solid #e5e5e0;border-radius:6px;padding:10px 12px;font-size:11px;color:#aaa;line-height:1.6;margin-bottom:8px}
.verdict{border-radius:10px;padding:14px 16px;margin-bottom:12px;border:1px solid transparent}
.verdict.buy{background:#f0fdf4;border-color:#86efac}
.verdict.neg{background:#fffbeb;border-color:#fcd34d}
.verdict.dis{background:#fef2f2;border-color:#fca5a5}
.vt{display:flex;align-items:center;gap:10px;margin-bottom:7px}
.vic{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;color:#fff}
.verdict.buy .vic{background:#16a34a}.verdict.neg .vic{background:#d97706}.verdict.dis .vic{background:#dc2626}
.vlb{font-size:11px;color:#aaa;margin-bottom:1px}.vvl{font-size:16px;font-weight:500}
.verdict.buy .vvl{color:#16a34a}.verdict.neg .vvl{color:#d97706}.verdict.dis .vvl{color:#dc2626}
.vrs{font-size:12px;line-height:1.5;color:#555}
.kpis{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.kpi{background:#f4f4f0;border:1px solid #e5e5e0;border-radius:6px;padding:10px 12px}
.kl{font-size:11px;color:#aaa;margin-bottom:4px}
.kv{font-size:18px;font-weight:500;font-family:'Courier New',monospace;color:#1a1a1a;line-height:1.15}
.kv.pos{color:#16a34a}.kv.warn{color:#d97706}.kv.neg{color:#dc2626}
.ks{font-size:11px;color:#aaa;margin-top:2px;font-family:'Courier New',monospace}
.dr{display:flex;justify-content:space-between;align-items:baseline;padding:5px 0;border-bottom:1px solid #f0f0ea}
.dr:last-child{border-bottom:none}
.dl{font-size:11px;color:#666}
.dv{font-size:12px;font-family:'Courier New',monospace;color:#1a1a1a}
.dv.hl{color:#ba7517;font-weight:500}.dv.pos{color:#16a34a;font-weight:500}.dv.neg{color:#dc2626;font-weight:500}.dv.warn{color:#d97706}
.sttl{font-size:12px;font-weight:500;color:#555;margin-bottom:3px}
.ssub{font-size:11px;color:#aaa;margin-bottom:8px;line-height:1.4}
.st{width:100%;border-collapse:collapse;font-size:11px;font-family:'Courier New',monospace}
.st th{padding:4px 6px;color:#aaa;font-weight:500;text-align:center;border-bottom:1px solid #e5e5e0}
.st th:first-child{text-align:left}
.st td{padding:4px 6px;text-align:center;color:#666}
.st td:first-child{text-align:left;color:#aaa}
.st tr.base{background:#f4f4f0}
.sp{color:#16a34a;font-weight:500}.sw{color:#d97706}.sn{color:#dc2626}
.refbox{border:1px solid #fcd34d;border-radius:6px;padding:10px 12px;font-size:11px;color:#92400e;line-height:1.6;margin-top:8px;background:#fffbeb}
.refbox b{font-weight:500}
.gap{height:5px}
input[type=number]::-webkit-inner-spin-button{opacity:.4}
#mapa{height:280px;border-radius:10px;border:1px solid #e5e5e0;margin-bottom:8px;overflow:hidden}
.leaflet-popup-content-wrapper{border-radius:8px;font-family:system-ui,-apple-system,sans-serif}
.mkt-card{border:1px solid #e5e5e0;border-radius:10px;overflow:hidden;margin-bottom:8px}
.mkt-hdr{background:#f4f4f0;padding:9px 12px;font-size:12px;font-weight:500;color:#555;display:flex;align-items:center;justify-content:space-between}
.mkt-loc{font-size:11px;color:#ba7517}
.mkt-body{padding:12px}
.mkt-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.mkt-kpi{background:#fff;border:1px solid #e5e5e0;border-radius:6px;padding:10px 12px}
.mkt-kpi-lbl{font-size:10px;color:#aaa;margin-bottom:3px;text-transform:uppercase;letter-spacing:.04em}
.mkt-kpi-val{font-size:20px;font-weight:500;font-family:'Courier New',monospace;color:#1a1a1a;line-height:1}
.mkt-kpi-range{font-size:10px;color:#ba7517;margin-top:2px;font-family:'Courier New',monospace}
.mkt-kpi-sub{font-size:10px;color:#888;margin-top:3px}
.mkt-note{font-size:11px;color:#888;line-height:1.5;margin-bottom:8px}
.mkt-src{font-size:10px;color:#ccc;margin-bottom:8px}
.mkt-btns{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.mkt-btn{display:inline-flex;align-items:center;gap:4px;padding:6px 10px;border-radius:6px;font-size:11px;font-family:inherit;font-weight:500;cursor:pointer;text-decoration:none;border:1px solid #e5e5e0;background:#fff;color:#555}
.mkt-btn:hover{background:#f4f4f0}
.mkt-btn.dark{background:#1a1a1a;color:#fff;border-color:#1a1a1a}.mkt-btn.dark:hover{background:#333}
.mkt-btn.green{background:#f0fdf4;color:#15803d;border-color:#86efac}.mkt-btn.green:hover{background:#dcfce7}
.mkt-apply{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.loc-breadcrumb{font-size:11px;color:#aaa;margin-bottom:8px;line-height:1.8}
.loc-breadcrumb span{color:#ba7517;font-weight:500}
.pb-wrap{display:grid;grid-template-columns:minmax(0,2fr) minmax(0,1fr);gap:14px;align-items:start}
@media(max-width:700px){.pb-wrap{grid-template-columns:1fr}}
.pb-summary{position:sticky;top:16px}
.cat-block{border:1px solid #e5e5e0;border-radius:10px;margin-bottom:8px;overflow:hidden}
.cat-hdr{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;background:#f4f4f0;cursor:pointer;user-select:none}
.cat-hdr:hover{background:#eeeee8}
.cat-name{font-size:12px;font-weight:500;color:#555;display:flex;align-items:center;gap:8px}
.cat-badge{font-size:10px;color:#999;font-weight:400;background:#e8e8e4;border-radius:3px;padding:1px 5px}
.cat-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.cat-total-lbl{font-size:12px;font-family:'Courier New',monospace;color:#ba7517;font-weight:500}
.cat-body{display:none;border-top:1px solid #e5e5e0}.cat-body.open{display:block}
.ptable{width:100%;border-collapse:collapse}
.ptable th{font-size:10px;color:#aaa;font-weight:500;padding:5px 8px;text-align:left;border-bottom:1px solid #ededea;background:#fafaf8}
.ptable th.r{text-align:right}
.ptable td{padding:5px 8px;font-size:12px;border-bottom:1px solid #f5f5f2;vertical-align:middle}
.ptable tr:last-child td{border-bottom:none}
.ptable td.r{text-align:right;font-family:'Courier New',monospace;color:#444}
.ptable td.tc{text-align:right;font-family:'Courier New',monospace;color:#ba7517;font-weight:500}
.precio-ref{font-size:10px;color:#bbb;font-family:'Courier New',monospace}
.pinput{border:none;background:transparent;font-size:12px;font-family:inherit;color:#1a1a1a;width:100%;outline:none}
.pinput:focus{background:#fffbeb;border-radius:3px}
.pinput.mono{font-family:'Courier New',monospace;text-align:right}
.chk{width:14px;height:14px;accent-color:#ba7517;cursor:pointer}
.del-btn{background:none;border:none;cursor:pointer;color:#ddd;font-size:13px;padding:2px 4px}
.del-btn:hover{color:#dc2626}
.add-btn{display:flex;align-items:center;gap:5px;padding:7px 12px;font-size:11px;color:#ba7517;background:none;border:none;cursor:pointer;font-family:inherit;font-weight:500;width:100%}
.add-btn:hover{background:#fffbeb}
.pb-total-card{background:#1a1a1a;border-radius:10px;padding:16px;margin-bottom:8px}
.pb-total-lbl{font-size:11px;color:#666;margin-bottom:4px}
.pb-total-val{font-size:26px;font-weight:500;font-family:'Courier New',monospace;color:#fff;line-height:1}
.pb-total-sub{font-size:11px;color:#555;margin-top:4px;font-family:'Courier New',monospace}
.pb-sync-box{background:#f0fdf4;border:1px solid #86efac;border-radius:6px;padding:9px 12px;font-size:11px;color:#15803d;line-height:1.5;margin-bottom:8px}
.csr{display:flex;justify-content:space-between;align-items:baseline;padding:5px 0;border-bottom:1px solid #f0f0ea}
.csr:last-child{border-bottom:none}
.csl{font-size:11px;color:#666;display:flex;align-items:center;gap:6px}
.csv{font-size:12px;font-family:'Courier New',monospace;color:#1a1a1a}
.pb-actions{display:flex;gap:8px;margin-top:8px}
.pb-btn{padding:6px 12px;border:1px solid #e5e5e0;border-radius:6px;background:#fff;font-size:11px;font-family:inherit;cursor:pointer;color:#555;font-weight:500}
.pb-btn:hover{background:#f4f4f0}
.green-note{border:1px solid #86efac;background:#f0fdf4;border-radius:6px;padding:9px 12px;font-size:11px;color:#15803d;line-height:1.5;margin-bottom:8px}
.green-note b{font-weight:500}
</style>
</head>
<body>
<div class="app">
<div class="hdr"><span class="hdr-t">Return</span><span class="hdr-s">Analizador de inversión inmobiliaria</span>
<button id="pwa-install-btn" onclick="installPWA()" style="display:none;margin-left:auto;padding:5px 12px;border:1px solid #ba7517;border-radius:6px;background:#fff;font-size:11px;cursor:pointer;font-family:inherit;color:#ba7517;font-weight:500">+ Añadir a inicio</button></div>
<div class="tabs">
  <button class="tab active" onclick="sw('ap',this)">Activo</button>
  <button class="tab" onclick="sw('pp',this)">Presupuesto</button>
  <button class="tab" onclick="sw('fp',this)">Flip</button>
  <button class="tab" onclick="sw('bp',this)">Buy to rent</button>
  <button class="tab" onclick="sw('ip',this)">Importar</button>
  <button class="tab" onclick="sw('pp2',this);loadPortfolio()">Portfolio</button>
</div>
<div id="ap" class="panel active"><div class="g2"><div id="si"></div><div id="sr"></div></div></div>
<div id="pp" class="panel"><div id="presupuesto"></div></div>
<div id="fp" class="panel"><div class="g2"><div id="fi"></div><div id="fr"></div></div></div>
<div id="bp" class="panel"><div class="g2"><div id="bi"></div><div id="br"></div></div></div>
<div id="ip" class="panel"><div id="ip-content"></div></div>
<div id="pp2" class="panel"><div id="pp2-content"></div></div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
// ╔═══════════════════════════════════════════════════════╗
// ║         RETURN — Analizador de Inversión Inmobiliaria  ║
// ╠═══════════════════════════════════════════════════════╣
// ║  § 1  Utilidades y formateo                           ║
// ║  § 2  Estado global (S, F, B)                         ║
// ║  § 3  Mapa y ubicación (Leaflet + GEO database)       ║
// ║  § 4  Presupuesto por partidas                        ║
// ║  § 5  Cálculos financieros (cS, cF, cB)               ║
// ║  § 6  Constructores de UI                             ║
// ║  § 7  Eventos globales (us, uf, ub, sw, ts)           ║
// ║  § 8  Rendering (rSI, rSR, rFI, rFR, rBI, rBR)        ║
// ║  § 9  Config IA (OpenAI · Gemini · Claude)             ║
// ║  § 10 Importar anuncio con IA                         ║
// ║  § 11 Portfolio de casos                              ║
// ║  § 12 GitHub Storage                                  ║
// ║  § 13 Google Drive                                    ║
// ║  § 14 Auto-save · Auto-restore · Criterios búsqueda   ║
// ╚═══════════════════════════════════════════════════════╝

// ═══════════════════════════════════════════════════════
// § 1 · UTILIDADES Y FORMATEO
// ═══════════════════════════════════════════════════════
const ef=n=>isFinite(n)?new Intl.NumberFormat('es-ES',{maximumFractionDigits:0}).format(Math.round(n))+'\u202f\u20ac':'—';
const ep=(n,d=1)=>isFinite(n)&&!isNaN(n)?n.toFixed(d)+'%':'—';
const OS={};
// ═══════════════════════════════════════════════════════
// § 2 · ESTADO GLOBAL  —  S (Activo) · F (Flip) · B (BTR)
// ═══════════════════════════════════════════════════════
window.S={pc:75000,itp:7,not:1.5,dd:350,hon:0,fin:false,ltv:70,ti:4.5,hip:20};
window.F={sup:65,rm2:350,ct:15,ind:2000,pl:8,pv:120000,gv:5};
window.B={ref:8000,ct:15,rnt:550,vac:5,ibi:300,com:600,seg:180,imp:true,mnt:1,ges:0};
let S=window.S, F=window.F, B=window.B;
window._presupuestoTotal=null;

// ─── ESTADO SELECCIÓN ────────────────────────────────────────────────
// ═══════════════════════════════════════════════════════
// § 3 · MAPA Y UBICACIÓN  —  Leaflet + GEO database

let SEL={prov:'',mun:'',bar:'',sub:''};

            'Zona Centro':{coords:[37.357,-6.037],v:1370,a:8.6,note:'Núcleo comercial y servicios. Alta rotación de inquilinos.',
              poly:[[37.360,-6.036],[37.364,-6.038],[37.362,-6.044],[37.357,-6.043],[37.354,-6.040],[37.355,-6.035]]},

          }
        },

          subbarrios:{
            'Ribera Norte':{coords:[37.348,-6.029],v:1200,a:7.8,note:'Mejor conexión con Sevilla. Rehabilitación activa.',

            'Casco Histórico':{coords:[37.345,-6.036],v:1150,a:7.5,note:'Edificación antigua. Oportunidad de compra a bajo precio con reform integral.',

      }
    },

    'Mairena del Aljarafe':{coords:[37.344,-6.063],zoom:14,v:1650,a:9.5,vr:'1.400–1.900',ar:'8,5–11',

// ─── MAPA ──────────────────────────────────────────────────────────────
let mapObj=null,mapMarker=null,mapPoly=null,mapCircle=null,mapReady=false;

function initMap(){
  if(mapObj||!window.L)return;
  const el=document.getElementById('mapa');
  if(!el)return;
  mapObj=L.map('mapa',{zoomControl:true,attributionControl:true}).setView([40.0,-3.7],6);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© <a href="https://openstreetmap.org/copyright">OpenStreetMap</a>',maxZoom:19}).addTo(mapObj);
  mapReady=true;
}

function clearMapLayers(){
  if(mapMarker){mapMarker.remove();mapMarker=null;}
  if(mapPoly){mapPoly.remove();mapPoly=null;}
  if(mapCircle){mapCircle.remove();mapCircle=null;}
}

function updateMap(data,label){
  if(!mapReady)initMap();
  if(!mapReady)return;
  clearMapLayers();
  const coords=data.coords,zoom=data.zoom||13;
  mapObj.setView(coords,zoom,{animate:true});
  // Marcador
  const icon=L.divIcon({className:'',html:`<div style="background:#ba7517;width:12px;height:12px;border-radius:50%;border:3px solid #fff;box-shadow:0 1px 6px rgba(0,0,0,.5)"></div>`,iconSize:[12,12],iconAnchor:[6,6]});
  mapMarker=L.marker(coords,{icon}).addTo(mapObj);
  if(label)mapMarker.bindPopup(`<div style="font-family:system-ui;font-size:12px;font-weight:500;min-width:110px;line-height:1.5">${label}</div>`).openPopup();
  // Polígono si existe
  if(data.poly&&data.poly.length>2){
    mapPoly=L.polygon(data.poly,{color:'#ba7517',weight:2.5,opacity:0.9,fillColor:'#ba7517',fillOpacity:0.10,dashArray:'6,4'}).addTo(mapObj);
  } else {
    // Círculo indicativo si no hay polígono
    const radios={6:40000,9:20000,10:10000,11:8000,12:4000,13:1500,14:800,15:400,16:200};
    const r=radios[zoom]||1500;
    mapCircle=L.circle(coords,{color:'#ba7517',weight:1.5,opacity:0.7,fillColor:'#ba7517',fillOpacity:0.08,radius:r,dashArray:'5,5'}).addTo(mapObj);
  }
  setTimeout(()=>mapObj.invalidateSize(),100);
}

// ─── SELECCIÓN EN CASCADA ─────────────────────────────────────────────
function getD(){
  const p=GEO[SEL.prov],m=SEL.mun?p?.municipios?.[SEL.mun]:null,b=SEL.bar&&m?.barrios?m.barrios[SEL.bar]:null,s=SEL.sub&&b?.subbarrios?b.subbarrios[SEL.sub]:null;
  return{p,m,b,s};
}
function getMuns(){const {p}=getD();return p?Object.keys(p.municipios):[];}
function getBars(){const {m}=getD();return m?.barrios?Object.keys(m.barrios):[];}
function getSubs(){const {b}=getD();return b?.subbarrios?Object.keys(b.subbarrios):[];}

function setProv(v){SEL={prov:v,mun:'',bar:'',sub:''};rebuildSelects();doMapUpdate();}
function setMun(v){SEL={...SEL,mun:v,bar:'',sub:''};rebuildSelects();doMapUpdate();}
function setBar(v){SEL={...SEL,bar:v,sub:''};rebuildSelects();doMapUpdate();}
function setSub(v){SEL={...SEL,sub:v};rebuildSelects();doMapUpdate();}

function doMapUpdate(){
  const {p,m,b,s}=getD();
  const data=s||b||m||p;
  if(!data)return;
  let lbl=[];
  if(SEL.sub)lbl.push(`<b>${SEL.sub}</b>`);
  if(SEL.bar)lbl.push(SEL.bar);
  if(SEL.mun)lbl.push(`<span style="color:#888;font-weight:400">${SEL.mun}</span>`);
  updateMap(data,lbl.length?lbl.join('<br>'):SEL.prov);
  rPreciosMercado();
}

function optList(items,sel,ph){
  return`<option value="">${ph}</option>`+items.map(v=>`<option value="${v}"${v===sel?' selected':''}>${v}</option>`).join('');
}

function rebuildSelects(){
  const muns=getMuns(),bars=getBars(),subs=getSubs();
  const ms=document.getElementById('sel-mun');
  if(ms){ms.innerHTML=optList(muns,SEL.mun,'— municipio —');ms.disabled=!SEL.prov;}
  const row_b=document.getElementById('row-bar'),bs=document.getElementById('sel-bar');
  if(row_b&&bs){row_b.style.display=muns.length&&SEL.mun&&bars.length?'':'none';bs.innerHTML=optList(bars,SEL.bar,'— barrio —');bs.disabled=!SEL.mun;}
  const row_s=document.getElementById('row-sub'),ss=document.getElementById('sel-sub');
  if(row_s&&ss){row_s.style.display=SEL.bar&&subs.length?'':'none';ss.innerHTML=optList(subs,SEL.sub,'— sub-barrio —');ss.disabled=!SEL.bar;}
  rPreciosMercado();
}

function rPreciosMercado(){
  const el=document.getElementById('mkt-panel');
  if(!el)return;
  const {m,b,s}=getD();
  if(!m){el.innerHTML='';return;}
  const precio=s||b||m;
  const nivel=s?SEL.sub:b?SEL.bar:SEL.mun;
  const nivel2=s?`${SEL.bar} · ${SEL.mun}`:b?SEL.mun:'';
  const sup=+F.sup||65;
  const pvEst=Math.round(precio.v*sup),rentEst=Math.round(precio.a*sup);
  const slug=m.slug||'';
  const rango_v=(s||b)?m.vr:m.vr;
  const rango_a=(s||b)?m.ar:m.ar;
  el.innerHTML=`<div class="mkt-card">
    <div class="mkt-hdr">Mercado<span class="mkt-loc">${nivel}${nivel2?` · ${nivel2}`:''}</span></div>
    <div class="mkt-body">
      <div class="mkt-grid">
        <div class="mkt-kpi"><div class="mkt-kpi-lbl">Venta</div>
          <div class="mkt-kpi-val">${precio.v.toLocaleString('es-ES')} €/m²</div>
          ${rango_v?`<div class="mkt-kpi-range">Rango mun.: ${rango_v} €/m²</div>`:''}
          <div class="mkt-kpi-sub">Para ${sup} m² → <b>${pvEst.toLocaleString('es-ES')} €</b></div>
        </div>
        <div class="mkt-kpi"><div class="mkt-kpi-lbl">Alquiler</div>
          <div class="mkt-kpi-val">${precio.a.toFixed(1)} €/m²</div>
          ${rango_a?`<div class="mkt-kpi-range">Rango mun.: ${rango_a} €/m²</div>`:''}
          <div class="mkt-kpi-sub">Para ${sup} m² → <b>${rentEst.toLocaleString('es-ES')} €/mes</b></div>
        </div>
      </div>
      ${precio.note?`<div class="mkt-note">${precio.note}</div>`:''}
      <div class="mkt-src">Estimación mercado 2024 (Idealista · MITMA · Tinsa). Verificar con anuncio real.</div>
      <div class="mkt-btns">
        ${slug?`<a class="mkt-btn dark" href="https://www.idealista.com/venta-viviendas/${slug}/" target="_blank">Ver venta →</a>
        <a class="mkt-btn dark" href="https://www.idealista.com/alquiler-viviendas/${slug}/" target="_blank">Ver alquiler →</a>`:''}
      </div>
      <div class="mkt-apply">
        <button class="mkt-btn green" onclick="applyPV(${pvEst})">Aplicar precio venta → Flip</button>
        <button class="mkt-btn green" onclick="applyRent(${rentEst})">Aplicar renta → Buy to rent</button>
      </div>
    </div>
  </div>`;
}

window.applyPV=(v)=>{F.pv=v;rFI();rFR();sw('fp',document.querySelectorAll('.tab')[2]);};

function cS(s){const it=s.pc*s.itp/100,nr=s.pc*s.not/100,hn=s.pc*s.hon/100,ga=it+nr+s.dd+hn,pr=s.fin?s.pc*s.ltv/100:0,r=s.ti/100/12,n=s.hip*12,cm=pr>0&&r>0?pr*r*Math.pow(1+r,n)/(Math.pow(1+r,n)-1):0;return{it,nr,hn,ga,pr,cm};}
function cF(s,f){const b=cS(s),cr=window._presupuestoTotal||f.sup*f.rm2,co=cr*f.ct/100,io=s.fin?b.pr*s.ti/100*f.pl/12:0,tot=s.pc+b.ga+cr+co+f.ind+io,cap=Math.max(s.fin?s.pc*(1-s.ltv/100)+b.ga+cr+co+f.ind+io:tot,1),gve=f.pv*f.gv/100,ing=f.pv-gve,mb=f.pv-tot,mn=ing-tot,rt=mn/tot*100,rc=mn/cap*100,ra=f.pl>0?(Math.pow(Math.max(1+rc/100,.0001),12/f.pl)-1)*100:NaN,sens=[-10,-5,0,5,10].map(pp=>{const pve=f.pv*(1+pp/100);return[-15,0,15].map(rp=>{const crf=cr*(1+rp/100),cf2=crf*f.ct/100,t2=s.pc+b.ga+crf+cf2+f.ind+io,mn2=pve*(1-f.gv/100)-t2,c2=Math.max(s.fin?s.pc*(1-s.ltv/100)+b.ga+crf+cf2+f.ind+io:t2,1);return mn2/c2*100;});});return{...b,cr,co,io,tot,cap,gve,ing,mb,mn,rt,rc,ra,sens};}
function cB(s,b2){const b=cS(s),ref=window._presupuestoTotal||b2.ref,co=ref*b2.ct/100,tot=s.pc+b.ga+ref+co,cap=Math.max(tot-b.pr,1),ca=b.cm*12,ra=b2.rnt*12,ve=ra*b2.vac/100,ie=ra-ve,si=b2.imp?ra*.045:0,mt=s.pc*b2.mnt/100,gs=ra*b2.ges/100,gt=b2.ibi+b2.com+b2.seg+si+mt+gs,bn=ie-gt,rb=ra/Math.max(tot,1)*100,rn=bn/Math.max(tot,1)*100,cf=bn-ca,coc=s.fin?cf/cap*100:rn,pb=bn>0?tot/bn:Infinity,gf=b2.ibi+b2.com+b2.seg+mt,dn=1-b2.vac/100-(b2.imp?.045:0)-b2.ges/100,r7=dn>.05?(tot*.07+gf)/dn/12:0;return{...b,co,ref,tot,cap,ca,ra,ve,ie,si,mt,gs,gt,bn,rb,rn,cf,coc,pb,r7};}

function vF(rc,mn){if(!isFinite(rc)||mn<=0)return{c:'dis',i:'✕',l:'Descartar',w:'Sin margen neto positivo.'};if(rc>=25)return{c:'buy',i:'✓',l:'Comprar',w:`ROI sobre capital del ${ep(rc)} en ${F.pl} meses. Margen sólido.`};if(rc>=15)return{c:'neg',i:'~',l:'Negociar',w:`ROI del ${ep(rc)} ajustado. Negociar precio o reducir reforma.`};return{c:'dis',i:'✕',l:'Descartar',w:`ROI del ${ep(rc)} insuficiente. No compensa riesgo ni iliquidez.`};}
function vB(rn,coc,fin){const m=fin?coc:rn,lb=fin?'cash on cash':'rentabilidad neta';if(!isFinite(m)||m<=0)return{c:'dis',i:'✕',l:'Descartar',w:'Rentabilidad negativa.'};if(m>=7)return{c:'buy',i:'✓',l:'Comprar',w:`${ep(m)} de ${lb}. Yield sólido.`};if(m>=5)return{c:'neg',i:'~',l:'Negociar',w:`${ep(m)} de ${lb}. Correcto pero con margen. Negociar precio.`};if(m>=3.5)return{c:'neg',i:'~',l:'Negociar',w:`${ep(m)} de ${lb}. Ajustado. Solo válido con fuerte revalorización.`};return{c:'dis',i:'✕',l:'Descartar',w:`${ep(m)} de ${lb}. Por debajo del umbral mínimo.`};}

// Registrar Service Worker para PWA
// PWA Install prompt
let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  const btn = document.getElementById('pwa-install-btn');
  if(btn) btn.style.display = '';
});
window.addEventListener('appinstalled', () => {
  const btn = document.getElementById('pwa-install-btn');
  if(btn) btn.style.display = 'none';
  deferredPrompt = null;
});
window.installPWA = async function(){
  if(!deferredPrompt){ 
    alert('Para instalar en iPhone:\n1. Pulsa el botón compartir (□↑) en Safari\n2. Selecciona "Añadir a pantalla de inicio"');
    return;
  }
  deferredPrompt.prompt();
  const result = await deferredPrompt.userChoice;
  deferredPrompt = null;
  const btn = document.getElementById('pwa-install-btn');
  if(btn) btn.style.display = 'none';
};

if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('/sw.js').then(reg=>{
      console.log('SW registrado:', reg.scope);
      // Notificar si hay actualización disponible
      reg.addEventListener('updatefound', ()=>{
        const newWorker = reg.installing;
        newWorker.addEventListener('statechange', ()=>{
          if(newWorker.state==='installed' && navigator.serviceWorker.controller){
            if(confirm('Hay una nueva versión disponible. ¿Actualizar?')){
              newWorker.postMessage('skipWaiting');
              window.location.reload();
            }
          }
        });
      });
    }).catch(err=>console.log('SW error:', err));
  });
}
</script>

window.fetchUrl = async function(){

  if(!url){ alert('Introduce una URL'); return; }
  const cfg = loadConfig();
  const btn = document.getElementById('url-btn');
  const st  = document.getElementById('analyze-status');
  btn.textContent = 'Leyendo...'; btn.disabled = true;
  st.textContent = ''; st.style.color = '#aaa';

  // ── MÉTODO 1: Jina AI Reader — GRATIS, sin API key ───────────────
  st.textContent = 'Leyendo con Jina Reader (gratis)...';
  try{
    const jinaUrl = 'https://r.jina.ai/' + url;
    const c1 = new AbortController(); setTimeout(()=>c1.abort(), 15000);
    const r = await fetch(jinaUrl, {
      headers:{ 'Accept': 'text/plain', 'X-Return-Format': 'text' },
      signal: c1.signal
    });
    if(r.ok){
      let raw = await r.text();
      // Limpiar basura típica de portales inmobiliarios
      // Quitar bloques de idiomas repetidos
      raw = raw.replace(/(Español Català English Français[\s\S]{0,300}){2,}/g, '');
      // Quitar líneas de navegación irrelevantes
      raw = raw.replace(/Saltar al contenido principal.*?\n/g, '');
      raw = raw.replace(/Guardar favorito.*?\n/gi, '');
      raw = raw.replace(/Compartir.*?\n/gi, '');
      // Limpiar espacios múltiples
      raw = raw.replace(/\n{3,}/g, '\n\n').trim();
      const text = raw.substring(0, 6000).trim();
      if(text.length > 200){
        // Extraer URLs de imágenes del texto de Jina
        const imgMatches = raw.match(/https?:\/\/[^\s"')]+\.(?:jpg|jpeg|png|webp)[^\s"')]{0,100}/gi)||[];
        const uniqueImgs = [...new Set(imgMatches)].slice(0,6);
        window._jinaImageUrls = uniqueImgs;
        document.getElementById('listing-txt').value = text;
        st.textContent = '✓ Página leída'+(uniqueImgs.length?' · '+uniqueImgs.length+' fotos detectadas':'')+'. Pulsa Analizar con IA.';
        st.style.color = '#16a34a';
        btn.textContent = 'Leer página →'; btn.disabled = false;
        return;
      }
    }
  }catch(e){ console.log('Jina error:', e.message); }

  // ── MÉTODO 2: allorigins.win ──────────────────────────────────────
  st.textContent = 'Probando proxy alternativo...';
  try{
    const c2 = new AbortController(); setTimeout(()=>c2.abort(), 10000);
    const r2 = await fetch('https://api.allorigins.win/get?url='+encodeURIComponent(url), {signal:c2.signal});
    if(r2.ok){
      const d = await r2.json();
      const text = (d.contents||'')
        .replace(/<script[\s\S]*?<\/script>/gi,'')
        .replace(/<style[\s\S]*?<\/style>/gi,'')
        .replace(/<[^>]+>/g,' ')
        .replace(/\s+/g,' ')
        .substring(0,8000).trim();
      if(text.length > 200){
        document.getElementById('listing-txt').value = text;
        st.textContent = '✓ Contenido obtenido. Pulsa Analizar con IA.';
        st.style.color = '#16a34a';
        btn.textContent = 'Leer página →'; btn.disabled = false;
        return;
      }
    }
  }catch(e){ console.log('allorigins error:', e.message); }

  // ── MÉTODO 3: corsproxy.io ────────────────────────────────────────
  try{
    const c3 = new AbortController(); setTimeout(()=>c3.abort(), 10000);
    const r3 = await fetch('https://corsproxy.io/?'+encodeURIComponent(url), {signal:c3.signal});
    if(r3.ok){
      const text = (await r3.text())
        .replace(/<script[\s\S]*?<\/script>/gi,'')
        .replace(/<style[\s\S]*?<\/style>/gi,'')
        .replace(/<[^>]+>/g,' ')
        .replace(/\s+/g,' ')
        .substring(0,8000).trim();
      if(text.length > 200){
        document.getElementById('listing-txt').value = text;
        st.textContent = '✓ Contenido obtenido. Pulsa Analizar con IA.';
        st.style.color = '#16a34a';
        btn.textContent = 'Leer página →'; btn.disabled = false;
        return;
      }
    }
  }catch(e){ console.log('corsproxy error:', e.message); }

  // ── MÉTODO 4: Proxy propio ────────────────────────────────────────
  if(cfg.proxyUrl){
    try{
      const c4 = new AbortController(); setTimeout(()=>c4.abort(), 12000);
      const r4 = await fetch(cfg.proxyUrl+'?url='+encodeURIComponent(url), {signal:c4.signal});
      if(r4.ok){

          btn.textContent = 'Leer página →'; btn.disabled = false;

async function callGroq(txt,key){
  const r=await fetch('https://api.groq.com/openai/v1/chat/completions',{
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},
    body:JSON.stringify({
      model:'llama-3.1-8b-instant',
      messages:[{role:'user',content:PROMPT_BASE+txt.substring(0,5000)}],
      max_tokens:900,
      temperature:0.1
    })
  });
  if(!r.ok){const e=await r.json();throw new Error(e.error?.message||'Error Groq '+r.status);}
  return (await r.json()).choices?.[0]?.message?.content||'';
}

async function callOpenAI(txt,key){
  const r=await fetch('https://api.openai.com/v1/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},body:JSON.stringify({model:'gpt-4o-mini',messages:[{role:'user',content:PROMPT_BASE+txt.substring(0,5000)}],max_tokens:900})});
  if(!r.ok){const e=await r.json();throw new Error(e.error?.message||'Error OpenAI '+r.status);}
  return (await r.json()).choices?.[0]?.message?.content||'';
}

async function callGemini(txt,key){
  const r=await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash-lite:generateContent?key='+key,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({contents:[{parts:[{text:PROMPT_BASE+txt.substring(0,5000)}]}]})});
  if(!r.ok){const e=await r.json();throw new Error(e.error?.message||'Error Gemini '+r.status);}
  return (await r.json()).candidates?.[0]?.content?.parts?.[0]?.text||'';
}

async function callClaude(txt,key){
  const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:900,messages:[{role:'user',content:PROMPT_BASE+txt.substring(0,5000)}]})});
  if(!r.ok){const e=await r.json();throw new Error(e.error?.message||'Error Claude '+r.status);}
  return (await r.json()).content?.[0]?.text||'';
}

window.analizarAnuncio = async function(){
  const txt=document.getElementById('listing-txt')?.value?.trim();
  if(!txt){alert('Pega primero el texto del anuncio');return;}
  const cfg=loadConfig();
  let provider=cfg.provider||'groq';
  // Auto-seleccionar proveedor si el actual no tiene key
  const keyMap={groq:cfg.groqKey,openai:cfg.openaiKey,google:cfg.googKey,anthropic:cfg.anthKey};
  if(!keyMap[provider]){
    // Buscar el primero que tenga key
    const available=Object.entries(keyMap).find(([,v])=>v);
    if(available) provider=available[0];
  }
  const key=provider==='openai'?cfg.openaiKey:provider==='google'?cfg.googKey:cfg.anthKey;
  if(!key){
    // Scroll up to config section and highlight it
    const cfgEl = document.getElementById('sec-cfg');
    if(cfgEl){ cfgEl.classList.add('open'); cfgEl.style.border='2px solid #dc2626'; setTimeout(()=>cfgEl.style.border='',3000); }
    alert('Necesitas guardar una API key.\n\nVe a la sección "Configuración IA" arriba, introduce tu clave y pulsa "Guardar configuración".');
    return;
  }
  const btn=document.getElementById('analyze-btn'),st=document.getElementById('analyze-status');
  btn.textContent='Analizando...';btn.disabled=true;
  st.textContent='Enviando a '+(provider==='groq'?'Groq (gratis)':provider==='openai'?'ChatGPT':provider==='google'?'Gemini':'Claude')+'...';
  st.style.color='#aaa';
  try{
    let raw='';
    if(provider==='openai') raw=await callOpenAI(txt,key);
    else if(provider==='google') raw=await callGemini(txt,key);
    else raw=await callClaude(txt,key);
    const m=raw.match(/\{[\s\S]*\}/);
    if(!m)throw new Error('La IA no devolvió JSON válido. Revisa la API key.');
    const parsed=JSON.parse(m[0]);
    mostrarResultadoImport(parsed);
    const pName=provider==='groq'?'Groq Llama 3.1 (gratis)':provider==='openai'?'GPT-4o mini':provider==='google'?'Gemini Flash':'Claude Sonnet';
    st.textContent='✓ Análisis completado con '+pName;st.style.color='#16a34a';
  }catch(e){st.textContent='Error: '+e.message;st.style.color='#dc2626';}
  btn.textContent='Analizar con IA';btn.disabled=false;
};

// ─── GUARDAR IMÁGENES COMO BASE64 ────────────────────────────────────
async function fetchImageAsBase64(url){
  // Intentar via proxy CORS para imágenes de portales
  const proxies = [
    'https://api.allorigins.win/raw?url=',
    'https://corsproxy.io/?',
  ];
  for(const proxy of proxies){
    try{
      const c = new AbortController();
      setTimeout(()=>c.abort(), 8000);
      const r = await fetch(proxy + encodeURIComponent(url), {signal:c.signal});
      if(!r.ok) continue;
      const blob = await r.blob();
      if(!blob.type.startsWith('image/')) continue;
      // Redimensionar a thumbnail para ahorrar espacio
      return await blobToBase64Thumbnail(blob, 400, 280);
    }catch(e){ continue; }
  }
  return null;
}

function blobToBase64Thumbnail(blob, maxW, maxH){
  return new Promise((resolve)=>{
    const img = new Image();
    const url = URL.createObjectURL(blob);
    img.onload = ()=>{
      URL.revokeObjectURL(url);
      const canvas = document.createElement('canvas');
      let w = img.width, h = img.height;
      const ratio = Math.min(maxW/w, maxH/h, 1);
      canvas.width = Math.round(w*ratio);
      canvas.height = Math.round(h*ratio);
      canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
      resolve(canvas.toDataURL('image/jpeg', 0.75));
    };
    img.onerror = ()=>{ URL.revokeObjectURL(url); resolve(null); };
    img.src = url;
  });
}

async function descargarFotos(urls){
  if(!urls||!urls.length) return [];
  const st = document.getElementById('analyze-status');
  const fotos = [];
  for(let i=0; i<Math.min(urls.length,5); i++){
    if(st) st.textContent = `Guardando foto ${i+1}/${Math.min(urls.length,5)}...`;
    const b64 = await fetchImageAsBase64(urls[i]);
    if(b64) fotos.push({url:urls[i], b64});
    else fotos.push({url:urls[i], b64:null}); // guardar URL aunque falle
  }
  if(st) st.textContent = '';
  return fotos;
}

const GH_REPO = 'enriquesem22/return-app';
const GH_FILE = 'portfolio.json';
const GH_STATE_FILE = 'state.json';
let ghToken = null;

function setGhStatus(msg, color){ const el=document.getElementById('gh-status'); if(el){el.textContent=msg;el.style.color=color||'#aaa';} }
function setGhLastSync(t){ const el=document.getElementById('gh-last-sync'); if(el)el.textContent='Última sync: '+t; }

window.testGithubToken = async function(){
  const token = document.getElementById('gh-token')?.value?.trim();
  if(!token){ alert('Introduce el token de GitHub'); return; }
  setGhStatus('Conectando...','#d97706');
  try{
    const r = await fetch(`https://api.github.com/repos/${GH_REPO}`,{
      headers:{'Authorization':'Bearer '+token,'Accept':'application/vnd.github.v3+json'}
    });
    if(!r.ok) throw new Error('Token inválido o sin acceso al repositorio');
    ghToken = token;
    // Save to config
    const cfg = loadConfig();
    cfg.ghToken = token;
    saveConfig(cfg);
    setGhStatus('✓ Conectado a GitHub','#16a34a');
    const actions = document.getElementById('gh-actions');
    if(actions) actions.style.display = '';
    // Auto-pull on connect
    await githubPull();
  }catch(e){ setGhStatus('Error: '+e.message,'#dc2626'); }
};

async function ghGetFile(filename){
  const r = await fetch(`https://api.github.com/repos/${GH_REPO}/contents/${filename}`,{
    headers:{'Authorization':'Bearer '+ghToken,'Accept':'application/vnd.github.v3+json'}
  });
  if(r.status===404) return null;
  if(!r.ok) throw new Error('Error leyendo '+filename+': '+r.status);
  const d = await r.json();
  return { content: JSON.parse(atob(d.content.replace(/\n/g,''))), sha: d.sha };
}

async function ghPutFile(filename, data, sha){
  const body = { message: 'Update '+filename, content: btoa(unescape(encodeURIComponent(JSON.stringify(data,null,2)))) };
  if(sha) body.sha = sha;
  const r = await fetch(`https://api.github.com/repos/${GH_REPO}/contents/${filename}`,{
    method:'PUT',
    headers:{'Authorization':'Bearer '+ghToken,'Accept':'application/vnd.github.v3+json','Content-Type':'application/json'},
    body: JSON.stringify(body)
  });
  if(!r.ok){ const e=await r.json(); throw new Error(e.message||'Error guardando '+filename); }
  return await r.json();
}

window.githubPush = async function(){
  if(!ghToken){ alert('Conecta GitHub primero'); return; }
  setGhStatus('Subiendo a GitHub...','#d97706');
  try{
    // Portfolio
    const portfolio = getPortfolio();
    const pfExisting = await ghGetFile(GH_FILE);
    await ghPutFile(GH_FILE, portfolio, pfExisting?.sha);
    // State
    const state = JSON.parse(localStorage.getItem('return_state_v1')||'{}');
    const stExisting = await ghGetFile(GH_STATE_FILE);
    await ghPutFile(GH_STATE_FILE, state, stExisting?.sha);
    const now = new Date().toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'});
    setGhStatus('✓ Guardado en GitHub a las '+now,'#16a34a');
    setGhLastSync(now);
  }catch(e){ setGhStatus('Error: '+e.message,'#dc2626'); }
};

window.githubPull = async function(){
  if(!ghToken) return;
  setGhStatus('Descargando de GitHub...','#d97706');
  try{
    // Portfolio - merge
    const pfData = await ghGetFile(GH_FILE);
    if(pfData && Array.isArray(pfData.content)){
      const local = getPortfolio();
      const merged = [...local];
      pfData.content.forEach(gc=>{ if(!merged.find(lc=>lc.id===gc.id)) merged.push(gc); });
      merged.sort((a,b)=>b.id-a.id);
      localStorage.setItem(DB_KEY, JSON.stringify(merged));
      const pp2el = document.getElementById('pp2-content');
      if(pp2el) renderPortfolio(pp2el);
    }
    // State
    const stData = await ghGetFile(GH_STATE_FILE);
    if(stData && stData.content){
      localStorage.setItem('return_state_v1', JSON.stringify(stData.content));
    }
    const now = new Date().toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'});
    setGhStatus('✓ Sincronizado a las '+now,'#16a34a');
    setGhLastSync(now);
  }catch(e){ setGhStatus('Error: '+e.message,'#dc2626'); }
};

}

  if(!driveClientId){ alert('Introduce el Client ID de OAuth y guarda la configuración primero'); return; }
  const cfg = loadConfig();
  cfg.driveClientId = driveClientId;
  saveConfig(cfg);
  setDriveStatus('Conectando...','#d97706');
  // Cargar Google APIs si no están disponibles
  if(!window.google || !window.gapi){
    try{
      await new Promise(function(res,rej){
        var s1=document.createElement('script');
        s1.src='https://apis.google.com/js/api.js';
        s1.onload=function(){
          var s2=document.createElement('script');
          s2.src='https://accounts.google.com/gsi/client';
          s2.onload=res; s2.onerror=rej;
          document.head.appendChild(s2);
        };
        s1.onerror=rej;
        document.head.appendChild(s1);
      });
    }catch(e){ setDriveStatus('Error cargando Google APIs: '+e.message,'#dc2626'); return; }
  }
  try{
    driveTokenClient = google.accounts.oauth2.initTokenClient({
      client_id: driveClientId,
      scope: DRIVE_SCOPES,
      callback: async (resp)=>{
        if(resp.error){ setDriveStatus('Error OAuth: '+resp.error,'#dc2626'); return; }
        driveToken = resp.access_token;
        setDriveStatus('✓ Conectado a Google Drive','#16a34a');
        updateDriveUI(true);
        await driveSyncAll();
      }
    });
    driveTokenClient.requestAccessToken({prompt:'consent'});
  }catch(e){
    setDriveStatus('Error: '+e.message+' — Asegúrate de que la Drive API está habilitada en GCP','#dc2626');
  }
};

// ─── DRIVE API HELPERS ────────────────────────────────────────────────
async function driveListFiles(){
  const pf = encodeURIComponent("name='" + DRIVE_PORTFOLIO_FILE + "' or name='" + DRIVE_STATE_FILE + "'");
  const q = pf + '&fields=files(id,name,modifiedTime)&spaces=drive&q=' + encodeURIComponent('trashed=false');
  const qFinal = encodeURIComponent("(name='" + DRIVE_PORTFOLIO_FILE + "' or name='" + DRIVE_STATE_FILE + "') and trashed=false");
  const url = 'https://www.googleapis.com/drive/v3/files?q=' + qFinal + '&fields=files(id,name,modifiedTime)';
  const r = await fetch(url, {headers:{'Authorization':'Bearer '+driveToken}});
  if(!r.ok) throw new Error('Error listando archivos: '+r.status);
  const d = await r.json();
  return d.files || [];
}

async function driveReadFile(fileId){
  const r = await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`,
    {headers:{'Authorization':'Bearer '+driveToken}});
  if(!r.ok) throw new Error('Error leyendo archivo: '+r.status);
  return await r.json();
}

async function driveWriteFile(name, data, existingId){
  const token = driveToken;
  const jsonStr = JSON.stringify(data);
  if(!existingId){
    // Multipart upload: metadata + content in one request
    const boundary = 'return_app_boundary_xyz';
    const meta = JSON.stringify(DRIVE_FOLDER_ID ? {name, parents:[DRIVE_FOLDER_ID]} : {name});
    const body = '--'+boundary+'\r\n'+
      'Content-Type: application/json; charset=UTF-8\r\n\r\n'+
      meta+'\r\n'+
      '--'+boundary+'\r\n'+
      'Content-Type: application/json\r\n\r\n'+
      jsonStr+'\r\n'+
      '--'+boundary+'--';
    const r = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart',{
      method:'POST',
      headers:{
        'Authorization':'Bearer '+token,
        'Content-Type':'multipart/related; boundary='+boundary
      },
      body
    });
    if(!r.ok){const e=await r.text();throw new Error('Error creando archivo: '+r.status+' '+e);}
    const result = await r.json();
    return result.id;
  } else {
    // Update existing file content
    const r = await fetch(`https://www.googleapis.com/upload/drive/v3/files/${existingId}?uploadType=media`,{
      method:'PATCH',
      headers:{'Authorization':'Bearer '+token,'Content-Type':'application/json'},
      body: jsonStr
    });
    if(!r.ok){const e=await r.text();throw new Error('Error actualizando archivo: '+r.status+' '+e);}
    return existingId;
  }
}

// ─── SYNC FUNCTIONS ───────────────────────────────────────────────────
async function driveSyncAll(){
  setDriveStatus('Sincronizando...','#d97706');
  try{
    const files = await driveListFiles();
    const pfFile = files.find(f=>f.name===DRIVE_PORTFOLIO_FILE);
    const stFile = files.find(f=>f.name===DRIVE_STATE_FILE);

    // Merge Drive + local portfolio
    let mergedPortfolio = JSON.parse(localStorage.getItem(DB_KEY)||'[]');
    if(pfFile){
      const drivePf = await driveReadFile(pfFile.id);
      if(Array.isArray(drivePf)){
        drivePf.forEach(dc=>{ if(!mergedPortfolio.find(lc=>lc.id===dc.id)) mergedPortfolio.push(dc); });
        mergedPortfolio.sort((a,b)=>b.id-a.id);
        localStorage.setItem(DB_KEY, JSON.stringify(mergedPortfolio));
      }
    }
    // Push merged back to Drive
    await driveWriteFile(DRIVE_PORTFOLIO_FILE, mergedPortfolio, pfFile?.id);
    if(document.getElementById('pp2-content')) renderPortfolio(document.getElementById('pp2-content'));

    // Pull state from Drive
    if(stFile){
      const state = await driveReadFile(stFile.id);
      localStorage.setItem('return_state_v1', JSON.stringify(state));
    }
    // Push state to Drive
    const localState = JSON.parse(localStorage.getItem('return_state_v1')||'{}');
    await driveWriteFile(DRIVE_STATE_FILE, localState, stFile?.id);

    const now = new Date().toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'});
    setDriveStatus('✓ Sincronizado a las '+now,'#16a34a');
    updateDriveLastSync(now);
  }catch(e){
    setDriveStatus('Error sync: '+e.message,'#dc2626');
    console.error(e);
  }
}

window.drivePush = async function(){
  if(!driveToken){ alert('Conecta con Google Drive primero'); return; }
  setDriveStatus('Subiendo a Drive...','#d97706');
  try{
    // Capture LIVE current state
    const liveState = {
      S: {...window.S},
      F: {...window.F},
      B: {...window.B},
      SEL: {...(window.SEL||{})},
      presupuesto: window._presupuestoTotal||null,
      CATS: window.CATS ? window.CATS.map(c=>({n:c.n,open:c.open,items:c.items.map(i=>({...i}))})) : [],
      savedAt: new Date().toISOString()
    };
    // Also update localStorage
    localStorage.setItem('return_state_v1', JSON.stringify(liveState));

    const portfolio = JSON.parse(localStorage.getItem('return_portfolio_v1')||'[]');

    const files = await driveListFiles();
    const pfFile = files.find(f=>f.name===DRIVE_PORTFOLIO_FILE);
    const stFile = files.find(f=>f.name===DRIVE_STATE_FILE);

    await Promise.all([
      driveWriteFile(DRIVE_PORTFOLIO_FILE, portfolio, pfFile?.id),
      driveWriteFile(DRIVE_STATE_FILE, liveState, stFile?.id)
    ]);

    const now = new Date().toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'});
    setDriveStatus('✓ Subido a las '+now,'#16a34a');
    updateDriveLastSync(now);
  }catch(e){ setDriveStatus('Error: '+e.message,'#dc2626'); }
};

window.drivePull = async function(){
  if(!driveToken){ alert('Conecta con Google Drive primero'); return; }
  if(!confirm('¿Cargar desde Drive? Esto sobreescribirá los datos locales.'))return;
  setDriveStatus('Descargando de Drive...','#d97706');
  try{
    const files = await driveListFiles();
    const pfFile = files.find(f=>f.name===DRIVE_PORTFOLIO_FILE);
    const stFile = files.find(f=>f.name===DRIVE_STATE_FILE);
    if(pfFile){
      const portfolio = await driveReadFile(pfFile.id);
      localStorage.setItem('return_portfolio_v1', JSON.stringify(portfolio));
      if(document.getElementById('pp2-content')) window.loadPortfolio();
    }
    if(stFile){
      const state = await driveReadFile(stFile.id);
      localStorage.setItem('return_state_v1', JSON.stringify(state));
      autoRestore();
    }
    const now = new Date().toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'});
    setDriveStatus('✓ Cargado a las '+now,'#16a34a');
    updateDriveLastSync(now);
  }catch(e){ setDriveStatus('Error: '+e.message,'#dc2626'); }
};

const STATE_KEY='return_state_v1';

function autoSave(){
  try{
    localStorage.setItem(STATE_KEY,JSON.stringify({
      S:{...window.S},F:{...window.F},B:{...window.B},
      SEL:{...window.SEL},
      presupuesto:window._presupuestoTotal||null,
      CATS:window.CATS?window.CATS.map(c=>({n:c.n,open:c.open,items:c.items.map(i=>({d:i.d,u:i.u,q:i.q,p:i.p,on:i.on,ref:i.ref||''}))})):[],
      savedAt:new Date().toISOString()
    }));
  }catch(e){}
}

function autoRestore(){
  try{
    const raw=localStorage.getItem(STATE_KEY);
    if(!raw)return;
    const st=JSON.parse(raw);
    if(st.S)Object.assign(window.S,st.S);
    if(st.F)Object.assign(window.F,st.F);
    if(st.B)Object.assign(window.B,st.B);
    if(st.SEL)Object.assign(window.SEL,st.SEL);
    if(st.presupuesto)window._presupuestoTotal=st.presupuesto;
    if(st.CATS&&st.CATS.length)window.CATS=st.CATS;
    // Rebuild UI after restore
    if(window.rSI)window.rSI();
    if(window.rSR)window.rSR();
    if(window.rPresupuesto)window.rPresupuesto();
    if(window.rFI)window.rFI();
    if(window.rFR)window.rFR();
    if(window.rBI)window.rBI();
    if(window.rBR)window.rBR();
    // Restore location dropdowns and map
    if(window.SEL&&window.SEL.prov){
      setTimeout(()=>{
        if(window.rebuildSelects)window.rebuildSelects();
        if(window.doMapUpdate)window.doMapUpdate();
      },300);
    }
  }catch(e){console.log('Restore error:',e);}
}

      <button onclick="abrirPrefs()" style="padding:4px 10px;border:1px solid #e5e5e0;border-radius:5px;background:#fff;font-size:11px;cursor:pointer;font-family:inherit;color:#555;font-weight:500">Editar</button>
    </div>
    <div id="prefs-badge"></div>`;
  sr.insertBefore(card, sr.firstChild);
  mostrarBadgePrefs();
};

// ─── PATCH us/uf/ub/tsh/tb2 para auto-save ───────────────────────────
const _origUs=window.us,_origUf=window.uf,_origUb=window.ub,_origTsh=window.tsh,_origTb2=window.tb2;
window.us=(k,v)=>{if(_origUs)_origUs(k,v);autoSave();};
window.uf=(k,v)=>{if(_origUf)_origUf(k,v);autoSave();};
window.ub=(k,v)=>{if(_origUb)_origUb(k,v);autoSave();};
window.tsh=(k)=>{if(_origTsh)_origTsh(k);autoSave();};
window.tb2=(k)=>{if(_origTb2)_origTb2(k);autoSave();};

// Patch SEL updates to auto-save
const _origSetProv=window.setProv,_origSetMun=window.setMun,_origSetBar=window.setBar,_origSetSub=window.setSub;
window.setProv=(v)=>{if(_origSetProv)_origSetProv(v);autoSave();};
window.setMun=(v)=>{if(_origSetMun)_origSetMun(v);autoSave();};
window.setBar=(v)=>{if(_origSetBar)_origSetBar(v);autoSave();};
window.setSub=(v)=>{if(_origSetSub)_origSetSub(v);autoSave();};

// ─── RESTAURAR AL CARGAR ──────────────────────────────────────────────
window.addEventListener('load', function(){
  // 1. Restaurar estado guardado
  try{ autoRestore(); }catch(e){ console.error('autoRestore:',e); }

  // 2. Renderizar pestaña Importar
  try{
    var ipEl = document.getElementById('ip-content');
    if(ipEl && !ipEl.dataset.ready && typeof importarHTML === 'function'){
      ipEl.dataset.ready = '1';
      var cfg = loadConfig();
      ipEl.innerHTML = importarHTML();
      var setV = function(id,v){ var e=document.getElementById(id); if(e&&v) e.value=v; };
      setV('ai-provider', cfg.provider||'groq');
      setV('groq-key', cfg.groqKey||'');
      setV('openai-key', cfg.openaiKey||'');
      setV('goog-key', cfg.googKey||'');
      setV('anth-key', cfg.anthKey||'');
      setV('proxy-url', cfg.proxyUrl||'');
      setV('drive-client-id', cfg.driveClientId||'');
      setV('gh-token', cfg.ghToken||'');
      if(cfg.driveClientId) driveClientId = cfg.driveClientId;
      if(cfg.ghToken){
        ghToken = cfg.ghToken;
        var ga = document.getElementById('gh-actions');
        if(ga) ga.style.display = '';
        setGhStatus('✓ GitHub configurado (↓ para sincronizar)','#16a34a');
      }
      try{ toggleProviderFields(); }catch(e){}
    }
  }catch(e){ console.error('init importar:',e); }

  // 3. Renderizar Portfolio
  try{
    var pp2El = document.getElementById('pp2-content');
    if(pp2El && typeof renderPortfolio === 'function') renderPortfolio(pp2El);
  }catch(e){ console.error('init portfolio:',e); }
});

</script>
