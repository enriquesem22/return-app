<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Return — Analizador de inversión inmobiliaria</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
  <meta name="theme-color" content="#ba7517">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:system-ui,-apple-system,sans-serif;background:#f9f9f7;color:#1a1a1a;min-height:100vh;padding:24px}
    .app{max-width:1200px;margin:0 auto}
    .hdr{display:flex;align-items:baseline;gap:10px;padding-bottom:12px;border-bottom:1px solid #e5e5e0;flex-wrap:wrap}
    .hdr-t{font-size:22px;font-weight:500}
    .hdr-s{font-size:12px;color:#999}
    .tabs{display:flex;border-bottom:1px solid #e5e5e0;margin-bottom:16px;flex-wrap:wrap}
    .tab{padding:10px 16px;border:none;background:transparent;cursor:pointer;font-family:inherit;font-size:13px;font-weight:500;color:#999;border-bottom:2px solid transparent;margin-bottom:-1px}
    .tab.active{color:#ba7517;border-bottom-color:#ba7517}
    .panel{display:none}
    .panel.active{display:block}
    .g2{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:14px;align-items:start}
    @media(max-width:700px){.g2{grid-template-columns:1fr}}
    .sec{border:1px solid #e5e5e0;border-radius:10px;margin-bottom:8px;overflow:hidden;background:#fff}
    .sec-h{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;background:#f4f4f0;cursor:pointer;user-select:none}
    .sec-h:hover{background:#eeeee8}
    .sec-ht{font-size:12px;font-weight:500;color:#555}
    .arr{font-size:11px;color:#aaa;display:inline-block;transition:transform .15s}
    .arr.open{transform:rotate(180deg)}
    .sec-b{padding:12px;border-top:1px solid #e5e5e0;display:none}
    .sec-b.open{display:block}
    .irow{margin-bottom:9px}
    .irow:last-child{margin-bottom:0}
    .ilbl{font-size:11px;color:#666;margin-bottom:3px}
    .iwrap{display:flex;align-items:center;border:1px solid #e5e5e0;border-radius:6px;overflow:hidden;background:#fff}
    .iwrap:focus-within{border-color:#ba7517;box-shadow:0 0 0 2px rgba(186,117,23,.1)}
    .iwrap input,.iwrap select,.iwrap textarea{flex:1;border:none;background:#fff;padding:7px 10px;font-size:13px;font-family:inherit;color:#1a1a1a;outline:none;min-width:0}
    .iwrap select:disabled{color:#bbb;cursor:not-allowed;background:#fafaf8}
    .iunit{padding:6px 9px;font-size:11px;color:#aaa;font-family:'Courier New',monospace;background:#f4f4f0;border-left:1px solid #e5e5e0;white-space:nowrap}
    .irow-num .iwrap input{font-family:'Courier New',monospace}
    .trow{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px}
    .tlbl{font-size:12px;color:#555}
    .tsub{font-size:11px;color:#aaa;margin-top:1px}
    .tog{width:38px;height:21px;border-radius:11px;background:#ccc;cursor:pointer;position:relative;flex-shrink:0;transition:background .2s}
    .tog.on{background:#ba7517}
    .togk{position:absolute;top:3px;left:3px;width:15px;height:15px;border-radius:50%;background:#fff;transition:left .18s}
    .tog.on .togk{left:20px}
    .sum-card{background:#f4f4f0;border:1px solid #e5e5e0;border-radius:10px;padding:14px;margin-bottom:8px}
    .sum-title{font-size:12px;font-weight:500;color:#555;margin-bottom:10px}
    .note-card{border:1px solid #e5e5e0;border-radius:6px;padding:10px 12px;font-size:11px;color:#777;line-height:1.6;margin-bottom:8px;background:#fff}
    .verdict{border-radius:10px;padding:14px 16px;margin-bottom:12px;border:1px solid transparent}
    .verdict.buy{background:#f0fdf4;border-color:#86efac}
    .verdict.neg{background:#fffbeb;border-color:#fcd34d}
    .verdict.dis{background:#fef2f2;border-color:#fca5a5}
    .vt{display:flex;align-items:center;gap:10px;margin-bottom:7px}
    .vic{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;color:#fff}
    .verdict.buy .vic{background:#16a34a}
    .verdict.neg .vic{background:#d97706}
    .verdict.dis .vic{background:#dc2626}
    .vlb{font-size:11px;color:#aaa;margin-bottom:1px}
    .vvl{font-size:16px;font-weight:500}
    .verdict.buy .vvl{color:#16a34a}
    .verdict.neg .vvl{color:#d97706}
    .verdict.dis .vvl{color:#dc2626}
    .vrs{font-size:12px;line-height:1.5;color:#555}
    .kpis{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
    .kpi{background:#f4f4f0;border:1px solid #e5e5e0;border-radius:6px;padding:10px 12px}
    .kl{font-size:11px;color:#aaa;margin-bottom:4px}
    .kv{font-size:18px;font-weight:500;font-family:'Courier New',monospace;color:#1a1a1a;line-height:1.15}
    .kv.pos{color:#16a34a}
    .kv.warn{color:#d97706}
    .kv.neg{color:#dc2626}
    .ks{font-size:11px;color:#aaa;margin-top:2px;font-family:'Courier New',monospace}
    .dr{display:flex;justify-content:space-between;align-items:baseline;padding:5px 0;border-bottom:1px solid #f0f0ea;gap:12px}
    .dr:last-child{border-bottom:none}
    .dl{font-size:11px;color:#666}
    .dv{font-size:12px;font-family:'Courier New',monospace;color:#1a1a1a;text-align:right}
    .dv.hl{color:#ba7517;font-weight:500}
    .dv.pos{color:#16a34a;font-weight:500}
    .dv.neg{color:#dc2626;font-weight:500}
    .dv.warn{color:#d97706}
    .sttl{font-size:12px;font-weight:500;color:#555;margin-bottom:3px}
    .ssub{font-size:11px;color:#aaa;margin-bottom:8px;line-height:1.4}
    .st{width:100%;border-collapse:collapse;font-size:11px;font-family:'Courier New',monospace}
    .st th{padding:4px 6px;color:#aaa;font-weight:500;text-align:center;border-bottom:1px solid #e5e5e0}
    .st th:first-child{text-align:left}
    .st td{padding:4px 6px;text-align:center;color:#666}
    .st td:first-child{text-align:left;color:#aaa}
    .st tr.base{background:#f4f4f0}
    .sp{color:#16a34a;font-weight:500}
    .swarn{color:#d97706}
    .sn{color:#dc2626}
    .refbox{border:1px solid #fcd34d;border-radius:6px;padding:10px 12px;font-size:11px;color:#92400e;line-height:1.6;margin-top:8px;background:#fffbeb}
    .gap{height:5px}
    input[type=number]::-webkit-inner-spin-button{opacity:.4}
    #mapa{height:280px;border-radius:10px;border:1px solid #e5e5e0;margin-bottom:8px;overflow:hidden;background:#fff}
    .leaflet-popup-content-wrapper{border-radius:8px;font-family:system-ui,-apple-system,sans-serif}
    .mkt-card{border:1px solid #e5e5e0;border-radius:10px;overflow:hidden;margin-bottom:8px;background:#fff}
    .mkt-hdr{background:#f4f4f0;padding:9px 12px;font-size:12px;font-weight:500;color:#555;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
    .mkt-loc{font-size:11px;color:#ba7517}
    .mkt-body{padding:12px}
    .mkt-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
    .mkt-kpi{background:#fff;border:1px solid #e5e5e0;border-radius:6px;padding:10px 12px}
    .mkt-kpi-lbl{font-size:10px;color:#aaa;margin-bottom:3px;text-transform:uppercase;letter-spacing:.04em}
    .mkt-kpi-val{font-size:20px;font-weight:500;font-family:'Courier New',monospace;color:#1a1a1a;line-height:1}
    .mkt-kpi-range{font-size:10px;color:#ba7517;margin-top:2px;font-family:'Courier New',monospace}
    .mkt-kpi-sub{font-size:10px;color:#888;margin-top:3px}
    .mkt-note{font-size:11px;color:#888;line-height:1.5;margin-bottom:8px}
    .mkt-src{font-size:10px;color:#ccc;margin-bottom:8px}
    .mkt-btns{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
    .mkt-btn{display:inline-flex;align-items:center;gap:4px;padding:6px 10px;border-radius:6px;font-size:11px;font-family:inherit;font-weight:500;cursor:pointer;text-decoration:none;border:1px solid #e5e5e0;background:#fff;color:#555}
    .mkt-btn:hover{background:#f4f4f0}
    .mkt-btn.dark{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
    .mkt-btn.dark:hover{background:#333}
    .mkt-btn.green{background:#f0fdf4;color:#15803d;border-color:#86efac}
    .mkt-btn.green:hover{background:#dcfce7}
    .mkt-apply{display:grid;grid-template-columns:1fr 1fr;gap:6px}
    .pb-wrap{display:grid;grid-template-columns:minmax(0,2fr) minmax(0,1fr);gap:14px;align-items:start}
    @media(max-width:700px){.pb-wrap{grid-template-columns:1fr}.mkt-grid,.mkt-apply,.kpis{grid-template-columns:1fr}}
    .pb-summary{position:sticky;top:16px}
    .cat-block{border:1px solid #e5e5e0;border-radius:10px;margin-bottom:8px;overflow:hidden;background:#fff}
    .cat-hdr{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;background:#f4f4f0;cursor:pointer;user-select:none;gap:12px}
    .cat-hdr:hover{background:#eeeee8}
    .cat-name{font-size:12px;font-weight:500;color:#555;display:flex;align-items:center;gap:8px}
    .cat-badge{font-size:10px;color:#999;font-weight:400;background:#e8e8e4;border-radius:3px;padding:1px 5px}
    .cat-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
    .cat-total-lbl{font-size:12px;font-family:'Courier New',monospace;color:#ba7517;font-weight:500}
    .cat-body{display:none;border-top:1px solid #e5e5e0}
    .cat-body.open{display:block}
    .ptable{width:100%;border-collapse:collapse}
    .ptable th{font-size:10px;color:#aaa;font-weight:500;padding:5px 8px;text-align:left;border-bottom:1px solid #ededea;background:#fafaf8}
    .ptable th.r{text-align:right}
    .ptable td{padding:5px 8px;font-size:12px;border-bottom:1px solid #f5f5f2;vertical-align:middle}
    .ptable tr:last-child td{border-bottom:none}
    .ptable td.r{text-align:right;font-family:'Courier New',monospace;color:#444}
    .ptable td.tc{text-align:right;font-family:'Courier New',monospace;color:#ba7517;font-weight:500}
    .precio-ref{font-size:10px;color:#bbb;font-family:'Courier New',monospace}
    .pinput{border:none;background:transparent;font-size:12px;font-family:inherit;color:#1a1a1a;width:100%;outline:none}
    .pinput:focus{background:#fffbeb;border-radius:3px}
    .pinput.mono{font-family:'Courier New',monospace;text-align:right}
    .chk{width:14px;height:14px;accent-color:#ba7517;cursor:pointer}
    .del-btn{background:none;border:none;cursor:pointer;color:#ddd;font-size:13px;padding:2px 4px}
    .del-btn:hover{color:#dc2626}
    .add-btn{display:flex;align-items:center;gap:5px;padding:7px 12px;font-size:11px;color:#ba7517;background:none;border:none;cursor:pointer;font-family:inherit;font-weight:500;width:100%}
    .add-btn:hover{background:#fffbeb}
    .pb-total-card{background:#1a1a1a;border-radius:10px;padding:16px;margin-bottom:8px}
    .pb-total-lbl{font-size:11px;color:#888;margin-bottom:4px}
    .pb-total-val{font-size:26px;font-weight:500;font-family:'Courier New',monospace;color:#fff;line-height:1}
    .pb-total-sub{font-size:11px;color:#777;margin-top:4px;font-family:'Courier New',monospace}
    .pb-sync-box{background:#f0fdf4;border:1px solid #86efac;border-radius:6px;padding:9px 12px;font-size:11px;color:#15803d;line-height:1.5;margin-bottom:8px}
    .csr{display:flex;justify-content:space-between;align-items:baseline;padding:5px 0;border-bottom:1px solid #f0f0ea;gap:12px}
    .csr:last-child{border-bottom:none}
    .csl{font-size:11px;color:#666;display:flex;align-items:center;gap:6px}
    .csv{font-size:12px;font-family:'Courier New',monospace;color:#1a1a1a}
    .pb-actions{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap}
    .pb-btn{padding:6px 12px;border:1px solid #e5e5e0;border-radius:6px;background:#fff;font-size:11px;font-family:inherit;cursor:pointer;color:#555;font-weight:500}
    .pb-btn:hover{background:#f4f4f0}
    .green-note{border:1px solid #86efac;background:#f0fdf4;border-radius:6px;padding:9px 12px;font-size:11px;color:#15803d;line-height:1.5;margin-bottom:8px}
    .muted{font-size:10px;color:#aaa}
    .card-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
    @media(max-width:900px){.card-grid{grid-template-columns:repeat(2,1fr)}}
    @media(max-width:520px){.card-grid{grid-template-columns:1fr}}
    .err{position:fixed;top:0;left:0;right:0;background:#dc2626;color:#fff;padding:12px;font-size:11px;z-index:9999;font-family:monospace;white-space:pre-wrap}
  </style>
</head>
<body>
<div class="app">
  <div class="hdr">
    <span class="hdr-t">Return</span>
    <span class="hdr-s">Analizador de inversión inmobiliaria</span>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="sw('ap',this)">Activo</button>
    <button class="tab" onclick="sw('pp',this)">Presupuesto</button>
    <button class="tab" onclick="sw('fp',this)">Flip</button>
    <button class="tab" onclick="sw('bp',this)">Buy to rent</button>
    <button class="tab" onclick="sw('ip',this);initImport()">Importar</button>
    <button class="tab" onclick="sw('pp2',this);loadPortfolio()">Portfolio</button>
  </div>

  <div id="ap" class="panel active"><div class="g2"><div id="si"></div><div id="sr"></div></div></div>
  <div id="pp" class="panel"><div id="presupuesto"></div></div>
  <div id="fp" class="panel"><div class="g2"><div id="fi"></div><div id="fr"></div></div></div>
  <div id="bp" class="panel"><div class="g2"><div id="bi"></div><div id="br"></div></div></div>
  <div id="ip" class="panel"><div id="ip-content"></div><div id="import-result"></div></div>
  <div id="pp2" class="panel"><div id="pp2-content"></div></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

let mapObj = null, mapMarker = null, mapPoly = null, mapCircle = null, mapReady = false;

function initMap(){
  if (mapObj || !window.L) return;
  const el = document.getElementById('mapa');
  if (!el) return;
  mapObj = L.map('mapa', { zoomControl: true, attributionControl: true }).setView([40.0, -3.7], 6);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap', maxZoom: 19 }).addTo(mapObj);
  mapReady = true;
}

function clearMapLayers(){
  if (mapMarker) { mapMarker.remove(); mapMarker = null; }
  if (mapPoly) { mapPoly.remove(); mapPoly = null; }
  if (mapCircle) { mapCircle.remove(); mapCircle = null; }
}

function updateMap(data, label){
  if (!mapReady) initMap();
  if (!mapReady || !data || !data.coords) return;
  clearMapLayers();
  const coords = data.coords, zoom = data.zoom || 13;
  mapObj.setView(coords, zoom, { animate: true });
  const icon = L.divIcon({
    className: '',
    html: '<div style="background:#ba7517;width:12px;height:12px;border-radius:50%;border:3px solid #fff;box-shadow:0 1px 6px rgba(0,0,0,.5)"></div>',
    iconSize: [12, 12], iconAnchor: [6, 6]
  });
  mapMarker = L.marker(coords, { icon }).addTo(mapObj);
  if (label) mapMarker.bindPopup('<div style="font-family:system-ui;font-size:12px;font-weight:500;min-width:110px;line-height:1.5">' + label + '</div>').openPopup();
  if (Array.isArray(data.poly) && data.poly.length > 2) {
    mapPoly = L.polygon(data.poly, { color: '#ba7517', weight: 2.5, opacity: 0.9, fillColor: '#ba7517', fillOpacity: 0.10, dashArray: '6,4' }).addTo(mapObj);
  } else {
    const radios = { 6: 40000, 9: 20000, 10: 10000, 11: 8000, 12: 4000, 13: 1500, 14: 800, 15: 400, 16: 200 };
    const r = radios[zoom] || 1500;
    mapCircle = L.circle(coords, { color: '#ba7517', weight: 1.5, opacity: 0.7, fillColor: '#ba7517', fillOpacity: 0.08, radius: r, dashArray: '5,5' }).addTo(mapObj);
  }
  setTimeout(() => mapObj.invalidateSize(), 100);
}

function getD(){
  const p = GEO[SEL.prov] || null;
  const m = SEL.mun && p && p.municipios ? p.municipios[SEL.mun] || null : null;
  const b = SEL.bar && m && m.barrios ? m.barrios[SEL.bar] || null : null;
  const s = SEL.sub && b && b.subbarrios ? b.subbarrios[SEL.sub] || null : null;
  return { p, m, b, s };
}

function getMuns(){ const { p } = getD(); return p ? Object.keys(p.municipios || {}) : []; }
function getBars(){ const { m } = getD(); return m && m.barrios ? Object.keys(m.barrios) : []; }
function getSubs(){ const { b } = getD(); return b && b.subbarrios ? Object.keys(b.subbarrios) : []; }

function setProv(v){ SEL.prov = v; SEL.mun = ''; SEL.bar = ''; SEL.sub = ''; rebuildSelects(); doMapUpdate(); autoSave(); }
function setMun(v){ SEL.mun = v; SEL.bar = ''; SEL.sub = ''; rebuildSelects(); doMapUpdate(); autoSave(); }
function setBar(v){ SEL.bar = v; SEL.sub = ''; rebuildSelects(); doMapUpdate(); autoSave(); }
function setSub(v){ SEL.sub = v; rebuildSelects(); doMapUpdate(); autoSave(); }

function doMapUpdate(){
  const { p, m, b, s } = getD();
  const data = s || b || m || p;
  if (!data) return;
  const parts = [];
  if (SEL.sub) parts.push('<b>' + SEL.sub + '</b>');
  if (SEL.bar) parts.push(SEL.bar);
  if (SEL.mun) parts.push('<span style="color:#888;font-weight:400">' + SEL.mun + '</span>');
  updateMap(data, parts.length ? parts.join('<br>') : SEL.prov);
  rPreciosMercado();
}

function optList(items, sel, ph){
  return '<option value="">' + ph + '</option>' + items.map(v => '<option value="' + escapeHtml(v) + '"' + (v === sel ? ' selected' : '') + '>' + escapeHtml(v) + '</option>').join('');
}

function rebuildSelects(){
  const muns = getMuns(), bars = getBars(), subs = getSubs();
  const ms = document.getElementById('sel-mun');
  if (ms) { ms.innerHTML = optList(muns, SEL.mun, '— municipio —'); ms.disabled = !SEL.prov; }
  const rowB = document.getElementById('row-bar'), bs = document.getElementById('sel-bar');
  if (rowB && bs) { rowB.style.display = (SEL.mun && bars.length) ? '' : 'none'; bs.innerHTML = optList(bars, SEL.bar, '— barrio —'); bs.disabled = !SEL.mun; }
  const rowS = document.getElementById('row-sub'), ss = document.getElementById('sel-sub');
  if (rowS && ss) { rowS.style.display = (SEL.bar && subs.length) ? '' : 'none'; ss.innerHTML = optList(subs, SEL.sub, '— sub-barrio —'); ss.disabled = !SEL.bar; }
  rPreciosMercado();
}

function rPreciosMercado(){
  const el = document.getElementById('mkt-panel');
  if (!el) return;
  const { m, b, s } = getD();
  if (!m) { el.innerHTML = ''; return; }
  const precio = s || b || m;
  const nivel = s ? SEL.sub : (b ? SEL.bar : SEL.mun);
  const nivel2 = s ? (SEL.bar + ' · ' + SEL.mun) : (b ? SEL.mun : '');
  const sup = +F.sup || 65;
  const pvEst = Math.round(precio.v * sup);
  const rentEst = Math.round(precio.a * sup);
  const slug = m.slug || '';
  const rangoV = precio.vr || m.vr || '';
  const rangoA = precio.ar || m.ar || '';
  el.innerHTML =
    '<div class="mkt-card">' +
      '<div class="mkt-hdr">Mercado<span class="mkt-loc">' + escapeHtml(nivel + (nivel2 ? ' · ' + nivel2 : '')) + '</span></div>' +
      '<div class="mkt-body">' +
        '<div class="mkt-grid">' +
          '<div class="mkt-kpi">' +
            '<div class="mkt-kpi-lbl">Venta</div>' +
            '<div class="mkt-kpi-val">' + precio.v.toLocaleString('es-ES') + ' €/m²</div>' +
            (rangoV ? '<div class="mkt-kpi-range">Rango: ' + rangoV + ' €/m²</div>' : '') +
            '<div class="mkt-kpi-sub">Para ' + sup + ' m² → <b>' + pvEst.toLocaleString('es-ES') + ' €</b></div>' +
          '</div>' +
          '<div class="mkt-kpi">' +
            '<div class="mkt-kpi-lbl">Alquiler</div>' +
            '<div class="mkt-kpi-val">' + precio.a.toFixed(1) + ' €/m²</div>' +
            (rangoA ? '<div class="mkt-kpi-range">Rango: ' + rangoA + ' €/m²</div>' : '') +
            '<div class="mkt-kpi-sub">Para ' + sup + ' m² → <b>' + rentEst.toLocaleString('es-ES') + ' €/mes</b></div>' +
          '</div>' +
        '</div>' +
        (precio.note ? '<div class="mkt-note">' + escapeHtml(precio.note) + '</div>' : '') +
        '<div class="mkt-src">Estimación orientativa. Contrastar con comparables reales.</div>' +
        '<div class="mkt-btns">' +
          (slug ? '<a class="mkt-btn dark" href="https://www.idealista.com/venta-viviendas/' + slug + '/" target="_blank">Ver venta →</a>' : '') +
          (slug ? '<a class="mkt-btn dark" href="https://www.idealista.com/alquiler-viviendas/' + slug + '/" target="_blank">Ver alquiler →</a>' : '') +
        '</div>' +
        '<div class="mkt-apply">' +
          '<button class="mkt-btn green" onclick="applyPV(' + pvEst + ')">Aplicar precio venta → Flip</button>' +
          '<button class="mkt-btn green" onclick="applyRent(' + rentEst + ')">Aplicar renta → Buy to rent</button>' +
        '</div>' +
      '</div>' +
    '</div>';
}

function cS(s){
  const it = s.pc * s.itp / 100;
  const nr = s.pc * s.not / 100;
  const hn = s.pc * s.hon / 100;
  const ga = it + nr + s.dd + hn;
  const pr = s.fin ? s.pc * s.ltv / 100 : 0;
  const r = s.ti / 100 / 12;
  const n = s.hip * 12;
  const cm = pr > 0 && r > 0 ? pr * r * Math.pow(1 + r, n) / (Math.pow(1 + r, n) - 1) : 0;
  return { it, nr, hn, ga, pr, cm };
}

function cF(s, f){
  const b = cS(s);
  const cr = window._presupuestoTotal || (f.sup * f.rm2);
  const co = cr * f.ct / 100;
  const io = s.fin ? b.pr * s.ti / 100 * f.pl / 12 : 0;
  const tot = s.pc + b.ga + cr + co + f.ind + io;
  const cap = Math.max(s.fin ? s.pc * (1 - s.ltv / 100) + b.ga + cr + co + f.ind + io : tot, 1);
  const gve = f.pv * f.gv / 100;
  const ing = f.pv - gve;
  const mb = f.pv - tot;
  const mn = ing - tot;
  const rt = mn / tot * 100;
  const rc = mn / cap * 100;
  const ra = f.pl > 0 ? (Math.pow(Math.max(1 + rc / 100, .0001), 12 / f.pl) - 1) * 100 : NaN;
  const sens = [-10,-5,0,5,10].map(pp => {
    const pve = f.pv * (1 + pp / 100);
    return [-15,0,15].map(rp => {
      const crf = cr * (1 + rp / 100), cf2 = crf * f.ct / 100;
      const t2 = s.pc + b.ga + crf + cf2 + f.ind + io;
      const mn2 = pve * (1 - f.gv / 100) - t2;
      const c2 = Math.max(s.fin ? s.pc * (1 - s.ltv / 100) + b.ga + crf + cf2 + f.ind + io : t2, 1);
      return mn2 / c2 * 100;
    });
  });
  return { ...b, cr, co, io, tot, cap, gve, ing, mb, mn, rt, rc, ra, sens };
}

function cB(s, b2){
  const b = cS(s);
  const ref = window._presupuestoTotal || b2.ref;
  const co = ref * b2.ct / 100;
  const tot = s.pc + b.ga + ref + co;
  const cap = Math.max(tot - b.pr, 1);
  const ca = b.cm * 12;
  const ra = b2.rnt * 12;
  const ve = ra * b2.vac / 100;
  const ie = ra - ve;
  const si = b2.imp ? ra * .045 : 0;
  const mt = s.pc * b2.mnt / 100;
  const gs = ra * b2.ges / 100;
  const gt = b2.ibi + b2.com + b2.seg + si + mt + gs;
  const bn = ie - gt;
  const rb = ra / Math.max(tot, 1) * 100;
  const rn = bn / Math.max(tot, 1) * 100;
  const cf = bn - ca;
  const coc = s.fin ? cf / cap * 100 : rn;
  const pb = bn > 0 ? tot / bn : Infinity;
  const gf = b2.ibi + b2.com + b2.seg + mt;
  const dn = 1 - b2.vac / 100 - (b2.imp ? .045 : 0) - b2.ges / 100;
  const r7 = dn > .05 ? (tot * .07 + gf) / dn / 12 : 0;
  return { ...b, co, ref, tot, cap, ca, ra, ve, ie, si, mt, gs, gt, bn, rb, rn, cf, coc, pb, r7 };
}

function vF(rc, mn){
  if (!isFinite(rc) || mn <= 0) return { c:'dis', i:'✕', l:'Descartar', w:'Sin margen neto positivo.' };
  if (rc >= 25) return { c:'buy', i:'✓', l:'Comprar', w:'ROI sobre capital sólido. La operación pinta bien.' };
  if (rc >= 15) return { c:'neg', i:'~', l:'Negociar', w:'ROI correcto, pero conviene negociar precio o recortar reforma.' };
  return { c:'dis', i:'✕', l:'Descartar', w:'ROI insuficiente para el riesgo asumido.' };
}

function vB(rn, coc, fin){
  const m = fin ? coc : rn;
  const lb = fin ? 'cash on cash' : 'rentabilidad neta';
  if (!isFinite(m) || m <= 0) return { c:'dis', i:'✕', l:'Descartar', w:'Rentabilidad negativa.' };
  if (m >= 7) return { c:'buy', i:'✓', l:'Comprar', w:'Yield sólido: ' + ep(m) + ' de ' + lb + '.' };
  if (m >= 5) return { c:'neg', i:'~', l:'Negociar', w:'Rentabilidad correcta pero ajustable.' };
  if (m >= 3.5) return { c:'neg', i:'~', l:'Negociar', w:'Rentabilidad justa. Solo vale si esperas revalorización.' };
  return { c:'dis', i:'✕', l:'Descartar', w:'Rentabilidad por debajo del umbral mínimo.' };
}

function basicExtract(txt){
  const t = txt || '';
  const getPrice = () => {
    const m = t.match(/(\d{2,3}(?:[.\s]\d{3})+|\d{4,7})\s*€/i);
    return m ? parseNum(m[1]) : null;
  };
  const getSup = () => {
    const m = t.match(/(\d+(?:[.,]\d+)?)\s*m²/i);
    return m ? parseNum(m[1]) : null;
  };
  const getHab = () => {
    const m = t.match(/(\d+)\s*(?:hab|habitaciones?)/i);
    return m ? parseInt(m[1], 10) : null;
  };
  const getBanos = () => {
    const m = t.match(/(\d+)\s*(?:bañ|bano|baños|banos)/i);
    return m ? parseInt(m[1], 10) : null;
  };
  const getPlanta = () => {
    if (/bajo/i.test(t)) return 0;
    const m = t.match(/planta\s*(\d+)/i) || t.match(/(\d+)[ªº]\s*(?:planta)?/i);
    return m ? parseInt(m[1], 10) : null;
  };
  const ascensor = /con ascensor|ascensor/i.test(t) ? true : (/sin ascensor/i.test(t) ? false : null);
  let estado = null;
  if (/obra nueva/i.test(t)) estado = 'obra nueva';
  else if (/para reformar|a reformar/i.test(t)) estado = 'para reformar';
  else if (/buen estado|reformado|listo para entrar/i.test(t)) estado = 'buen estado';
  const comunidad = (() => {
    const m = t.match(/comunidad[:\s]+(\d+(?:[.,]\d+)?)\s*€\s*\/?\s*mes/i);
    return m ? parseNum(m[1]) : null;
  })();
  const ibi = (() => {
    const m = t.match(/ibi[:\s]+(\d+(?:[.,]\d+)?)\s*€\s*\/?\s*año/i);
    return m ? parseNum(m[1]) : null;
  })();
  return {
    precio: getPrice(),
    superficie: getSup(),
    superficie_util: null,
    habitaciones: getHab(),
    banos: getBanos(),
    planta: getPlanta(),
    ascensor,
    estado,
    ano_construccion: (() => { const m = t.match(/(?:año|construid[oa]).{0,10}(\d{4})/i); return m ? parseInt(m[1], 10) : null; })(),
    municipio: null,
    barrio: null,
    provincia: null,
    gastos_comunidad: comunidad,
    ibi,
    honorarios_agencia_pct: (() => { const m = t.match(/honorarios.*?(\d+(?:[.,]\d+)?)\s*%/i); return m ? parseNum(m[1]) : null; })(),
    garaje: /garaje|parking|plaza de garaje/i.test(t),
    trastero: /trastero/i.test(t),
    orientacion: (() => { const m = t.match(/orientaci[oó]n[:\s]+([a-záéíóúñ ]+)/i); return m ? m[1].trim() : null; })(),
    certificado_energetico: (() => { const m = t.match(/certificado energ[ée]tico[:\s]+([a-g])/i); return m ? m[1].toUpperCase() : null; })(),
    descripcion_breve: t.split('\n').filter(Boolean).slice(0, 2).join(' ').substring(0, 220) || 'Anuncio importado',
    plataforma: /idealista/i.test(t) ? 'idealista' : (/fotocasa/i.test(t) ? 'fotocasa' : (/pisos\.com/i.test(t) ? 'pisos.com' : 'otro')),
    notas_inversor: 'Extracción local automática. Revisar y completar manualmente los campos importantes.'
  };
}

window.analizarAnuncio = async function(){
  const txt = document.getElementById('listing-txt')?.value?.trim();
  if (!txt) { alert('Pega primero el texto del anuncio'); return; }

  const cfg = loadConfig();
  const provider = cfg.provider || 'none';
  const st = document.getElementById('analyze-status');
  const btn = document.getElementById('analyze-btn');
  btn.disabled = true;
  btn.textContent = 'Analizando…';
  st.textContent = 'Procesando…';
  st.style.color = '#aaa';

  try {
    let parsed = null;

    if (provider === 'none') {
      parsed = basicExtract(txt);
    } else {
      let raw = '';
      if (provider === 'openai') {
        if (!cfg.openaiKey) throw new Error('Falta OpenAI API key');
        raw = await callOpenAI(txt, cfg.openaiKey);
      } else if (provider === 'google') {
        if (!cfg.googKey) throw new Error('Falta Google API key');
        raw = await callGemini(txt, cfg.googKey);
      } else if (provider === 'anthropic') {
        if (!cfg.anthKey) throw new Error('Falta Anthropic API key');
        raw = await callClaude(txt, cfg.anthKey);
      }
      const m = raw.match(/\{[\s\S]*\}/);
      if (!m) throw new Error('La IA no devolvió JSON válido');
      parsed = JSON.parse(m[0]);
    }

    mostrarResultadoImport(parsed);
    st.textContent = '✓ Análisis completado';
    st.style.color = '#16a34a';
  } catch (e) {
    st.textContent = 'Error: ' + e.message;
    st.style.color = '#dc2626';
  }

  btn.disabled = false;
  btn.textContent = 'Analizar';
};

  const c = getPortfolio()[i];
  if (!c) return;

  if (c.F) Object.assign(F, c.F);
  if (c.B) Object.assign(B, c.B);
  if (c.loc) Object.assign(SEL, c.loc);
  if (c.CATS && c.CATS.length) window.CATS = c.CATS.map(cat => ({ ...cat, items: cat.items.map(it => ({ ...it })) }));
  window._presupuestoTotal = c.presupuesto || null;
  window._lastImport = c.importData || null;

let ghToken = null;
let ghRepo = 'enriquesem22/return-app';
let ghBranch = 'main';
let ghBasePath = '';

function setGhStatus(msg, color){
  const el = document.getElementById('gh-status');
  if (el) { el.textContent = msg; el.style.color = color || '#aaa'; }
}
function setGhLastSync(t){
  const el = document.getElementById('gh-last-sync');
  if (el) el.textContent = 'Última sync: ' + t;
}

window.testGithubToken = async function(){
  const cfg = loadConfig();
  ghToken = cfg.ghToken || document.getElementById('gh-token')?.value?.trim() || null;
  ghRepo = cfg.ghRepo || document.getElementById('gh-repo')?.value?.trim() || ghRepo;
  ghBranch = cfg.ghBranch || document.getElementById('gh-branch')?.value?.trim() || 'main';
  ghBasePath = cfg.ghPath || document.getElementById('gh-path')?.value?.trim() || '';

  if (!ghToken) { alert('Introduce el token de GitHub'); return; }
  setGhStatus('Conectando…', '#d97706');

  try {
    const r = await fetch('https://api.github.com/repos/' + ghRepo, {
      headers: { 'Authorization': 'Bearer ' + ghToken, 'Accept': 'application/vnd.github+json' }
    });
    if (!r.ok) throw new Error('Token inválido o sin acceso al repo');
    setGhStatus('✓ Conectado a GitHub', '#16a34a');
    const a = document.getElementById('gh-actions');
    if (a) a.style.display = '';
  } catch (e) {
    setGhStatus('Error: ' + e.message, '#dc2626');
  }
};

function ghPath(filename){
  const base = (ghBasePath || '').replace(/^\/+|\/+$/g, '');
  return base ? (base + '/' + filename) : filename;
}

async function ghGetFile(filename){
  const path = ghPath(filename);
  const url = 'https://api.github.com/repos/' + ghRepo + '/contents/' + encodeURIComponent(path) + '?ref=' + encodeURIComponent(ghBranch);
  const r = await fetch(url, { headers: { 'Authorization': 'Bearer ' + ghToken, 'Accept': 'application/vnd.github+json' } });
  if (r.status === 404) return null;
  if (!r.ok) throw new Error('Error leyendo ' + filename + ': ' + r.status);
  const d = await r.json();
  const content = decodeURIComponent(escape(atob((d.content || '').replace(/\n/g, ''))));
  return { content: JSON.parse(content), sha: d.sha };
}

async function ghPutFile(filename, data, sha){
  const path = ghPath(filename);
  const body = {
    message: 'Update ' + filename,
    content: btoa(unescape(encodeURIComponent(JSON.stringify(data, null, 2)))),
    branch: ghBranch
  };
  if (sha) body.sha = sha;
  const r = await fetch('https://api.github.com/repos/' + ghRepo + '/contents/' + encodeURIComponent(path), {
    method: 'PUT',
    headers: { 'Authorization': 'Bearer ' + ghToken, 'Accept': 'application/vnd.github+json', 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  if (!r.ok) {
    const e = await r.json().catch(() => ({}));
    throw new Error(e.message || ('Error guardando ' + filename));
  }
  return await r.json();
}

window.githubPush = async function(){
  if (!ghToken) { alert('Conecta GitHub primero'); return; }
  setGhStatus('Subiendo a GitHub…', '#d97706');
  try {
    const portfolio = getPortfolio();
    const state = JSON.parse(localStorage.getItem(STATE_KEY) || '{}');
    const pfExisting = await ghGetFile('portfolio.json');
    const stExisting = await ghGetFile('state.json');
    await ghPutFile('portfolio.json', portfolio, pfExisting?.sha);
    await ghPutFile('state.json', state, stExisting?.sha);
    const now = new Date().toLocaleTimeString('es-ES', { hour:'2-digit', minute:'2-digit' });
    setGhStatus('✓ Guardado en GitHub', '#16a34a');
    setGhLastSync(now);
  } catch (e) {
    setGhStatus('Error: ' + e.message, '#dc2626');
  }
};

window.githubPull = async function(){
  if (!ghToken) { alert('Conecta GitHub primero'); return; }
  setGhStatus('Descargando de GitHub…', '#d97706');
  try {
    const pfData = await ghGetFile('portfolio.json');
    if (pfData && Array.isArray(pfData.content)) {
      const local = getPortfolio();
      const merged = [...local];
      pfData.content.forEach(gc => { if (!merged.find(lc => lc.id === gc.id)) merged.push(gc); });
      merged.sort((a, b) => b.id - a.id);
      localStorage.setItem(DB_KEY, JSON.stringify(merged));
    }
    const stData = await ghGetFile('state.json');
    if (stData && stData.content) localStorage.setItem(STATE_KEY, JSON.stringify(stData.content));
    autoRestore();
    rSI(); rSR(); rPresupuesto(); rFI(); rFR(); rBI(); rBR();
    loadPortfolio();
    const now = new Date().toLocaleTimeString('es-ES', { hour:'2-digit', minute:'2-digit' });
    setGhStatus('✓ Sincronizado', '#16a34a');
    setGhLastSync(now);
  } catch (e) {
    setGhStatus('Error: ' + e.message, '#dc2626');
  }
};

const STATE_KEY = 'return_state_v2';
function autoSave(){
  try {
    localStorage.setItem(STATE_KEY, JSON.stringify({
      S: { ...S },
      F: { ...F },
      B: { ...B },
      SEL: { ...SEL },
      presupuesto: window._presupuestoTotal || null,
      CATS: window.CATS.map(c => ({ n:c.n, open:c.open, items:c.items.map(i => ({ ...i })) })),
      savedAt: new Date().toISOString()
    }));
  } catch {}
}

function autoRestore(){
  try {
    const raw = localStorage.getItem(STATE_KEY);
    if (!raw) return;
    const st = JSON.parse(raw);
    if (st.S) Object.assign(S, st.S);
    if (st.F) Object.assign(F, st.F);
    if (st.B) Object.assign(B, st.B);
    if (st.SEL) Object.assign(SEL, st.SEL);
    if (st.presupuesto) window._presupuestoTotal = st.presupuesto;
    if (st.CATS && st.CATS.length) window.CATS = st.CATS.map(cat => ({ ...cat, items: cat.items.map(it => ({ ...it })) }));
  } catch (e) { console.log('Restore error:', e); }
}

      zonasText: 'San Juan de Aznalfarache, Mairena del Aljarafe',

  }
}
function savePrefs(p){ localStorage.setItem(PREFS_KEY, JSON.stringify(p)); }

      '<div style="margin-bottom:12px"><div class="ilbl">Habitaciones mínimas</div><div class="iwrap" style="max-width:160px"><input type="number" id="pf-habMin" value="' + (p.habMin || 2) + '"><span class="iunit">hab</span></div></div>' +
      '<div style="margin-bottom:12px"><div class="ilbl">Zonas prioritarias</div><div class="iwrap"><textarea id="pf-zonas" rows="3">' + escapeHtml(p.zonasText || '') + '</textarea></div></div>' +
      '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px"><div><div class="ilbl">Yield mínima BTR</div><div class="iwrap"><input type="number" id="pf-yieldMin" value="' + (p.yieldMinBTR || 7) + '" step="0.5"><span class="iunit">%</span></div></div><div><div class="ilbl">ROI mínimo Flip</div><div class="iwrap"><input type="number" id="pf-roiMin" value="' + (p.roiMinFlip || 20) + '" step="1"><span class="iunit">%</span></div></div></div>' +
      '<div style="margin-bottom:16px"><div class="ilbl">Notas libres</div><div class="iwrap"><textarea id="pf-notas" rows="3">' + escapeHtml(p.notasLibres || '') + '</textarea></div></div>' +
      '<div style="display:flex;gap:8px"><button onclick="guardarPrefs()" class="pb-btn" style="flex:1;background:#1a1a1a;color:#fff;border-color:#1a1a1a">Guardar criterios</button><button onclick="this.closest(\'[data-modal=&quot;prefs&quot;]\').remove()" class="pb-btn">Cancelar</button></div>' +

function parseNum(v){ return Number(String(v).replace(/\./g, '').replace(',', '.').replace(/[^\d.-]/g, '')); }
function escapeHtml(str){ return String(str).replace(/[&<>"']/g, s => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[s])); }
function escapeAttr(str){ return escapeHtml(str).replace(/`/g, '&#96;'); }

window.onerror = function(msg, src, line, col, err){
  const d = document.createElement('div');
  d.className = 'err';
  d.textContent = 'ERR: ' + msg + '\nSRC: ' + (src || '?') + '\nL' + line + ':C' + col + '\n' + (err && err.stack ? err.stack.substring(0, 400) : '');
  document.body.appendChild(d);
  return false;
};

window.addEventListener('unhandledrejection', function(e){
  const d = document.createElement('div');
  d.className = 'err';
  d.style.top = '80px';
  d.style.background = '#d97706';
  d.textContent = 'PROMISE REJECTED: ' + (e.reason && e.reason.message ? e.reason.message : String(e.reason));
  document.body.appendChild(d);
});

function startupInit(){
  const cfg = loadConfig();
  ghToken = cfg.ghToken || null;
  ghRepo = cfg.ghRepo || ghRepo;
  ghBranch = cfg.ghBranch || ghBranch;
  ghBasePath = cfg.ghPath || '';

  initImport();
  loadPortfolio();
  rebuildSelects();
  if (SEL.prov) setTimeout(() => doMapUpdate(), 150);
}

if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', startupInit);
else startupInit();
